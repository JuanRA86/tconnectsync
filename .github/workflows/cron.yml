name: TConnect Sync
on:
  schedule:
    - cron: '*/5 * * * *' # Se ejecuta automáticamente cada 5 minutos
  workflow_dispatch: # Permite que tú le des al botón de "Play" manual

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tconnectsync
        run: |
          pip install tconnectsync

      - name: Run sync
        env:
          TCONNECT_EMAIL: ${{ secrets.TCONNECT_EMAIL }}
          TCONNECT_PASSWORD: ${{ secrets.TCONNECT_PASSWORD }}
          NS_URL: ${{ secrets.NS_URL }}
          NS_SECRET: ${{ secrets.NS_SECRET }}
        run: |
          tconnectsync --region EU --auto-update
